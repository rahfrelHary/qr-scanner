<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halley QR Scanner Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0b1220, #05070f);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  font-size:22px;
}

.card{
  width:340px;
  margin:20px auto;
  padding:15px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  box-shadow:0 0 25px rgba(0,212,255,0.15);
}

#reader{
  width:100%;
  border-radius:12px;
  overflow:hidden;
}

button{
  margin-top:15px;
  padding:14px 18px;
  width:100%;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:15px;
  color:#000;
  background:linear-gradient(135deg,#00d4ff,#3a7bd5);
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

#result{
  margin-top:15px;
  font-size:14px;
  color:#00ffae;
  word-break:break-word;
}

.small{
  font-size:11px;
  opacity:0.6;
  margin-top:8px;
}
</style>
</head>

<body>

<h1>📷 Halley QR Scanner Pro</h1>

<div class="card">

  <div id="reader"></div>

  <button onclick="startScanner()">▶ START SCAN</button>

  <div id="result">Waiting for scan...</div>

  <div class="small">Ataovy eo anaty frame ny QR code</div>

</div>

<script>

let scanner;
let started = false;

function beep(){
    try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.frequency.value = 900;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }catch(e){}
}

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(150);
    }
}

function onScanSuccess(text){

    document.getElementById("result").innerText = "✔ " + text;

    beep();
    vibrate();

    // OPTIONAL: auto login or redirect
    if(text.startsWith("http")){
        setTimeout(()=>{
            window.location.href = text;
        }, 800);
    }

    // stop after scan
    if(scanner){
        scanner.stop().then(()=> {
            started = false;
        });
    }
}

function startScanner(){

    if(started) return;

    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {

        if(devices.length === 0){
            alert("No camera found");
            return;
        }

        let cameraId = devices[0].id;

        scanner.start(
            cameraId,
            {
                fps: 12,
                qrbox: { width: 240, height: 240 }
            },
            onScanSuccess,
            () => {}
        );

        started = true;

    }).catch(err => {
        alert("Camera blocked or not allowed:\n" + err);
    });
}

</script>

</body>
</html>
